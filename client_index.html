<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>串口数据查看器</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        #data { width: 100%; height: 400px; border: 1px solid #ccc; overflow-y: scroll; background: #f9f9f9; padding: 8px; }
        .input-area { margin-top: 10px; }
        #sendInput { width: 80%; padding: 5px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>
    <h2>串口实时数据</h2>
    <div id="data"></div>
    <div class="input-area">
        <input type="text" id="sendInput" placeholder="向串口发送数据...">
        <button onclick="sendToSerial()">发送</button>
    </div>
    <script>
        // 替换为你的服务器 IP 和端口
        const ws = new WebSocket('ws://' + window.location.hostname + ':8080');

        ws.onopen = function() {
            console.log('WebSocket 连接已建立');
            addLine('[连接成功]');
        };

        ws.onmessage = function(event) {
            addLine(event.data);
        };

        ws.onclose = function() {
            console.log('WebSocket 连接已关闭');
            addLine('[连接断开]');
        };

        ws.onerror = function(error) {
            console.error('WebSocket 错误:', error);
            addLine('[错误] ' + error);
        };

        function addLine(text) {
            const dataDiv = document.getElementById('data');
            const line = document.createElement('div');
            line.textContent = text;
            dataDiv.appendChild(line);
            dataDiv.scrollTop = dataDiv.scrollHeight;
        }

        function sendToSerial() {
            const input = document.getElementById('sendInput');
            const msg = input.value;
            if (msg && ws.readyState === WebSocket.OPEN) {
                ws.send(msg);
                input.value = '';
            }
        }
    </script>
</body>
</html>
